<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Management System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- =============================================
       HEADER
  ============================================= -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🎓</span>
        <div>
          <h1>EduTrack</h1>
          <p>Student Management System</p>
        </div>
      </div>
      <button class="btn btn-primary" id="openAddModal">+ Add Student</button>
    </div>
  </header>

  <!-- =============================================
       MAIN CONTENT
  ============================================= -->
  <main class="main">

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-card">
        <span class="stat-number" id="totalCount">0</span>
        <span class="stat-label">Total Students</span>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="search-container">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search by name, email, course, or phone..."
        />
        <button class="clear-search" id="clearSearch" title="Clear search">✕</button>
      </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- Students Table -->
    <div class="table-container">
      <table class="students-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Phone</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="studentsTableBody">
          <!-- Rows are inserted by JavaScript -->
        </tbody>
      </table>

      <!-- Empty / Loading States -->
      <div class="empty-state" id="emptyState" style="display:none;">
        <p class="empty-icon">📭</p>
        <h3>No students found</h3>
        <p>Try adjusting your search, or add a new student.</p>
      </div>

      <div class="loading-state" id="loadingState">
        <div class="spinner"></div>
        <p>Loading students...</p>
      </div>
    </div>
  </main>

  <!-- =============================================
       ADD / EDIT MODAL
  ============================================= -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Add Student</h2>
        <button class="modal-close" id="closeModal">✕</button>
      </div>

      <form id="studentForm" novalidate>
        <!-- Hidden field to track which student we're editing -->
        <input type="hidden" id="studentId" />

        <div class="form-group">
          <label for="name">Full Name <span class="required">*</span></label>
          <input type="text" id="name" placeholder="e.g. Priya Sharma" maxlength="100" />
          <span class="field-error" id="nameError"></span>
        </div>

        <div class="form-group">
          <label for="email">Email Address <span class="required">*</span></label>
          <input type="email" id="email" placeholder="e.g. priya@example.com" maxlength="150" />
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="course">Course <span class="required">*</span></label>
          <input type="text" id="course" placeholder="e.g. Computer Science" maxlength="100" />
          <span class="field-error" id="courseError"></span>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number <span class="required">*</span></label>
          <input type="tel" id="phone" placeholder="e.g. 9876543210" maxlength="15" />
          <span class="field-error" id="phoneError"></span>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelModal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">Add Student</button>
        </div>
      </form>
    </div>
  </div>

  <!-- =============================================
       DELETE CONFIRMATION MODAL
  ============================================= -->
  <div class="modal-overlay" id="deleteOverlay">
    <div class="modal modal-small">
      <div class="modal-header">
        <h2>Delete Student</h2>
        <button class="modal-close" id="closeDeleteModal">✕</button>
      </div>
      <div class="delete-body">
        <p class="delete-icon">⚠️</p>
        <p>Are you sure you want to delete <strong id="deleteStudentName"></strong>?</p>
        <p class="delete-warning">This action cannot be undone.</p>
      </div>
      <div class="form-actions">
        <button class="btn btn-secondary" id="cancelDelete">Cancel</button>
        <button class="btn btn-danger" id="confirmDelete">Yes, Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
